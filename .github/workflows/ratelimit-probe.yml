# Tymczasowa sonda weryfikacyjna rate-limitera (hardening 2026-07-11).
# Runner GH ma inne publiczne IP niż maszyna testująca — pojedynczy zły login
# stąd rozstrzyga, czy kubełki auth są per realny klient (oczekiwane 401),
# czy zlepione za proxy Azure (wtedy 429). Do usunięcia po teście.
name: ratelimit-probe
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: single bad login from runner IP
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://if-app-walk4change-prod-pl.azurewebsites.net/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"probe@nonexistent.test","password":"wrongwrong"}')
          echo "PROBE_STATUS=$CODE"
          test "$CODE" = "401"
