name: docker

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Azure App Service after build+push"
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: olimpiagozdziewicz/walk4change-api

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy przez webhook CD App Service (Continuous Deployment po stronie
      # Azure; App Service śledzi ghcr.io/olimpiagozdziewicz/walk4change-api:latest
      # i po webhooku pobiera świeży obraz + restartuje kontener).
      # Dlatego tag :latest w kroku build+push jest kluczowy (metadata-action
      # taguje latest na default branch + short-sha).
      # Uwaga: azure/webapps-deploy@v3 z publish-profile NIE obsługuje aplikacji
      # kontenerowych ("Failed to get app runtime OS") — stąd webhook.
      # Zawsze przy push na main; przy ręcznym uruchomieniu tylko jeśli
      # input "deploy" jest true (domyślnie tak).
      - name: Trigger App Service pull
        if: ${{ github.event_name == 'push' || inputs.deploy }}
        env:
          WEBHOOK: ${{ secrets.AZURE_CD_WEBHOOK }}
        run: curl -fsS -X POST "$(printf '%s' "$WEBHOOK" | tr -d '[:space:]')"
