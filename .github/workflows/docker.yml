name: docker

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: h4cstolik3/walk4change-api

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitOps deploy: bump the image tag in the Helm chart that ArgoCD watches.
      # ArgoCD (automated sync, prune+selfHeal) rolls the new image onto k3s.
      # Requires repo secret HELM_DEPLOY_TOKEN — a PAT with write access to the
      # helm repo (kamilandrzejrybacki-inc/helm).
      - name: Bump Helm image tag (triggers ArgoCD deploy)
        env:
          HELM_REPO: kamilandrzejrybacki-inc/helm
          GH_TOKEN: ${{ secrets.HELM_DEPLOY_TOKEN }}
        run: |
          SHA_TAG=$(echo "${{ github.sha }}" | cut -c1-7)

          rm -rf /tmp/helm
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${HELM_REPO}.git" /tmp/helm
          cd /tmp/helm

          sed -i "s|^  tag:.*|  tag: \"${SHA_TAG}\"|" charts/walk4change/values.yaml

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add charts/walk4change/values.yaml
          git diff --cached --quiet || git commit -m "ci(walk4change): deploy ${SHA_TAG} [skip ci]"
          git push
